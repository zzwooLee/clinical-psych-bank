<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상심리사 퀴즈 뱅크</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>임상심리사 퀴즈 뱅크</h1>
    </header>

    <main class="container main-auth-container">
        <section id="auth-container" class="auth-section">
            
            <div id="guest-view" class="auth-card">
                <div class="auth-header">
                    <h2>환영합니다</h2>
                    <p>학습을 시작하려면 로그인해주세요.</p>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon">📧</span>
                        <input type="email" id="email" placeholder="이메일 주소">
                    </div>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="비밀번호">
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-primary main-btn" onclick="handleLogin()">로그인</button>
                    <button class="btn-secondary main-btn" onclick="handleSignUp()">회원가입</button>
                </div>
            </div>

            <div id="user-view" class="auth-card" style="display: none;">
                <div class="auth-header">
                    <h2>학습 준비 완료</h2>
                    <p id="user-display-info" style="margin-bottom: 20px;"></p>
                </div>
                <div class="button-group">
                    <button class="btn-primary main-btn" onclick="loadQuestions()">무료 문제 시작하기</button>
                    <button class="btn-logout-main" onclick="handleLogout()">로그아웃</button>
                </div>
            </div>
        </section>

        <section id="quiz-section" style="width: 100%; margin-top: 40px;">
            <div id="question-area"></div>
        </section>
    </main>

    <script src="common.js" defer></script>
</body>
</html>
