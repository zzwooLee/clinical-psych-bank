<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임상심리사 국가고시 정복</title>
  <link rel="stylesheet" href="style.css"> <script src="common.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="logo">임상심리사 퀴즈</div>
    <div id="user-info">로그인 정보 확인 중...</div>
  </header>

  <div class="container">
    <div id="premium-banner" style="display:none;">
      <p>더 많은 문제와 AI 예상문제를 만나보세요!</p>
      <button onclick="showPaymentInfo()">프리미엄 신청</button>
    </div>

    <div class="filter-bar">
      <select id="sel-grade"><option value="1">1급</option></select>
      <button onclick="loadQuestions()">문제 가져오기</button>
    </div>
    
    <div id="question-area"></div>
  </div>
  <script>
    // 페이지 로드 시 초기화
    window.onload = () => {
      console.log("앱 초기화 완료");
    };
  
    // 문제 데이터를 받아서 화면에 그리는 함수
    function renderQuestions(data) {
      console.log("받은 데이터:", data);
      
      if (!data || data.length === 0) {
        document.getElementById('question-area').innerHTML = 
          '<div style="padding:20px; text-align:center;">조건에 맞는 문제가 없습니다.</div>';
        return;
      }
  
      // common.js에 있는 전역 변수들에 데이터 할당
      allQuestions = data; 
      currentIndex = 0;
      
      // common.js의 renderQuestion()을 호출하여 첫 번째 문제 카드를 생성
      if (typeof renderQuestion === 'function') {
        renderQuestion();
      } else {
        console.error("renderQuestion 함수를 찾을 수 없습니다. common.js가 잘 로드되었는지 확인하세요.");
      }
    }
  </script>
</body>
</html>
