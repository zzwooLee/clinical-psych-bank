<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상심리사 퀴즈 - 메인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>임상심리사 퀴즈 뱅크</h1>
        </div>
    </header>

    <main class="container">
        <section id="auth-container" class="auth-section">
            <div id="guest-view" class="auth-card">
                <h2>로그인 후 이용 가능합니다</h2>
                <div class="input-group">
                    <input type="email" id="email" placeholder="이메일 주소">
                    <input type="password" id="password" placeholder="비밀번호">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="handleLogin()">로그인</button>
                    <button class="btn-secondary" onclick="handleSignUp()">회원가입</button>
                </div>
                <p class="auth-note">가입 시 기본 FREE 등급이 부여됩니다.</p>
            </div>

            <div id="user-view" class="auth-card" style="display: none;">
                <h2>학습 시스템 접속</h2>
                <div class="user-status-box">
                    <span id="user-display-info">로그인 정보 확인 중...</span>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="loadQuestions()">무료 문제 풀기</button>
                    <button class="btn-outline" onclick="handleLogout()">로그아웃</button>
                </div>
            </div>
        </section>

        <hr class="divider">

        <section id="quiz-section">
            <div class="filter-bar" id="free-filter" style="display: none;">
                <select id="sel-grade">
                    <option value="">급수 선택</option>
                    <option value="1">1급</option>
                    <option value="2">2급</option>
                </select>
            </div>
            
            <div id="question-area">
                <div class="welcome-msg">
                    <p>로그인 후 문제를 불러와주세요.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="common.js"></script>
    <script>
        // 페이지 로드 시 초기화 로직
        window.onload = () => {
            console.log("메인 페이지 초기화 완료");
            // 로컬 스토리지 등에 저장된 세션이 있다면 여기서 자동 로그인 처리 가능
        };
    </script>
</body>
</html>
