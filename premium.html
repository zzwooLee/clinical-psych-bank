<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상심리사 퀴즈 - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px; width: 340px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            text-align: center; border: 1px solid #edf2f7;
        }
        .modal-content h3 { margin-top: 0; color: #1a202c; font-weight: 800; margin-bottom: 10px; }
        .modal-content p  { font-size: 0.95rem; color: #4a5568; margin-bottom: 20px; line-height: 1.5; }
        #modal-date-input {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;
            margin-bottom: 20px; font-size: 1rem; outline: none; transition: border 0.2s;
        }
        #modal-date-input:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(66,153,225,0.2); }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; }
        .btn-modal-close   { background: #f7fafc; color: #4a5568; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: 500; }
        .btn-modal-confirm { background: #3182ce; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: 600; }

        .user-table th { background-color: #f8fafc; color: #64748b; font-weight: 600; font-size: 0.85rem; border-bottom: 2px solid #e2e8f0; }
        .user-table td { border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        /* ── 프리미엄 신청 버튼 ── */
        .btn-upgrade {
            background: linear-gradient(135deg, #f6c90e, #f0a500);
            color: #1a202c; border: none; padding: 7px 16px; border-radius: 20px;
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
            box-shadow: 0 2px 8px rgba(246,201,14,0.4); transition: all 0.2s; white-space: nowrap;
        }
        .btn-upgrade:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(246,201,14,0.5); }

        /* ── 업그레이드 모달 ── */
        .upgrade-icon  { font-size: 2.5rem; margin-bottom: 10px; }
        .upgrade-title { font-size: 1.4rem; font-weight: 800; color: #1a202c; margin-bottom: 6px; }
        .upgrade-sub   { font-size: 0.9rem; color: #718096; margin-bottom: 20px; }
        .upgrade-benefits {
            background: #f8faff; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 14px 18px; margin-bottom: 18px; text-align: left;
        }
        .upgrade-benefits li {
            list-style: none; font-size: 0.9rem; color: #2d3748;
            padding: 4px 0; display: flex; align-items: center; gap: 8px;
        }
        /* 가격 / 계좌 정보 박스 */
        .upgrade-payment-info {
            background: #fff8e1; border: 1px solid #f6c90e;
            border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; text-align: left;
        }
        .payment-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; font-size: 0.9rem; gap: 12px; }
        .payment-row + .payment-row { border-top: 1px dashed #f6d860; margin-top: 6px; padding-top: 10px; }
        .payment-label { color: #92700a; font-weight: 600; white-space: nowrap; }
        .payment-value { color: #1a202c; text-align: right; line-height: 1.6; }
        .btn-email-apply {
            width: 100%; padding: 14px; border-radius: 10px; font-size: 1rem;
            font-weight: 700; cursor: pointer; border: none;
            background: var(--primary-color, #364d79); color: #fff;
            transition: all 0.2s; margin-bottom: 10px;
        }
        .btn-email-apply:hover { background: #2a3d61; transform: translateY(-1px); }
        .upgrade-notice { font-size: 0.78rem; color: #a0aec0; margin-top: 14px; line-height: 1.6; }
        .btn-close-text { margin-top: 14px; background: none; border: none; color: #a0aec0; cursor: pointer; font-size: 0.85rem; }
        .btn-close-text:hover { color: #718096; }

        /* ── 자동 로그아웃 모달 ── */
        #auto-logout-modal .modal-content h3 { color: #e53e3e; }
    </style>
</head>
<body class="premium-body">

    <main class="container">

        <!-- 상단 상태 바 -->
        <div class="user-status-bar">
            <div class="user-info">
                <span class="user-name" id="display-name">로딩 중...</span>
                <span class="badge" id="display-status">FREE</span>
                <button id="btn-admin-menu" class="btn-admin-outline"
                        style="display:none; margin-left:10px;" onclick="toggleAdminPanel()">📊 통계 대시보드</button>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <!-- free 유저에게만 표시 -->
                <button id="btn-upgrade" class="btn-upgrade" style="display:none;" onclick="showUpgradeModal()">
                    ⭐ 프리미엄 신청
                </button>
                <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>

        <!-- 타이틀 -->
        <header class="premium-header">
            <h1 class="premium-title">임상심리사 퀴즈</h1>
        </header>

        <!-- 필터 바 -->
        <div class="filter-bar">
            <div class="filter-group">
                <!--
                    [FIX-#1, #3] onchange="updateSubjects()" 유지.
                    updateSubjects() 내부에서 initYears(grade)를 함께 호출하도록
                    수정했으므로 급수 변경 시 연도 목록도 자동으로 갱신됩니다.
                -->
                <select id="sel-grade" onchange="updateSubjects()">
                    <option value="">급수 전체</option>
                    <option value="1">1급</option>
                    <option value="2">2급</option>
                </select>
                <select id="sel-category">
                    <option value="">과목 전체</option>
                </select>
                <select id="sel-year">
                    <option value="">연도 전체</option>
                </select>
                <select id="sel-limit">
                    <option value="20">20문제</option>
                    <option value="30">30문제</option>
                    <option value="50">50문제</option>
                    <option value="100">100문제</option>
                </select>
            </div>
            <button class="btn-random" onclick="loadQuestions()">
                <span>🎲</span> 랜덤 출제
            </button>
        </div>

        <!-- 문제 영역 -->
        <div id="question-area">
            <div class="card empty-state">
                <p>상단 필터를 선택하고 <strong>랜덤 출제</strong> 버튼을 눌러주세요.</p>
            </div>
        </div>

        <!-- 관리자 패널 -->
        <div id="admin-panel" class="admin-panel-card" style="display:none; margin-top:30px; border:1px solid #e2e8f0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; color:#1a202c; font-size:1.25rem;">📊 시스템 관리 대시보드</h3>
                <button onclick="toggleAdminPanel()" style="background:none; border:none; cursor:pointer; font-size:1.5rem; color:#a0aec0;">✕</button>
            </div>
            <div class="admin-stats-grid">
                <div class="stat-card"><span class="stat-label">전체 문제 수</span><span id="stat-total-questions" class="stat-value">-</span></div>
                <div class="stat-card"><span class="stat-label">활성 사용자</span><span id="stat-today-users" class="stat-value">-</span></div>
                <div class="stat-card"><span class="stat-label">프리미엄 비율</span><span id="stat-premium-rate" class="stat-value">-%</span></div>
                <div class="stat-card" style="grid-column: span 3;">
                    <span class="stat-label">📋 프리미엄 문제 검수 현황 (2014~2019년)</span>
                    <span id="stat-verify-status" class="stat-value" style="font-size:1rem;">-</span>
                </div>
            </div>
            <div class="admin-user-management" style="margin-top:30px; border-top:1px solid #edf2f7; padding-top:25px;">
                <h4 style="color:#4a5568; margin-bottom:15px;">👥 회원 권한 관리</h4>
                <div style="overflow-x:auto; background:white; border-radius:8px; border:1px solid #f1f5f9;">
                    <table class="user-table" style="width:100%; border-collapse:collapse;">
                        <thead>
                            <tr>
                                <th style="text-align:left; padding:12px 15px;">이름</th>
                                <th style="text-align:left; padding:12px;">이메일</th>
                                <th style="text-align:center; padding:12px;">현재 등급</th>
                                <th style="text-align:center; padding:12px;">만료일</th>
                                <th style="text-align:center; padding:12px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="user-list-body">
                            <tr><td colspan="5" style="text-align:center; padding:30px; color:#a0aec0;">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div style="margin-top:20px; text-align:right;">
                <button class="btn-refresh-stats" onclick="refreshAdminDashboard()" style="padding:8px 16px; font-size:0.85rem;">🔄 데이터 새로고침</button>
            </div>
        </div>
    </main>

    <!-- 자동 로그아웃 경고 모달 -->
    <div id="auto-logout-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 style="color:#e53e3e;">⏰ 자동 로그아웃 예정</h3>
            <p>장시간 활동이 없어<br><strong><span id="auto-logout-count">120</span>초</strong> 후 자동으로 로그아웃됩니다.</p>
            <div class="modal-buttons">
                <button onclick="extendSession()" class="btn-modal-confirm" style="background:#364d79;">계속 학습하기</button>
            </div>
        </div>
    </div>

    <!-- 공통 확인 모달 -->
    <div id="custom-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-title">알림</h3>
            <p  id="modal-desc">내용을 입력해주세요.</p>
            <input type="date" id="modal-date-input" style="display:none;">
            <div class="modal-buttons">
                <button id="modal-cancel-btn"  onclick="closeCustomModal()" class="btn-modal-close">취소</button>
                <button id="modal-confirm-btn" class="btn-modal-confirm">확인</button>
            </div>
        </div>
    </div>

    <!-- 프리미엄 업그레이드 안내 모달 -->
    <div id="upgrade-modal" class="modal-overlay" style="display:none;" onclick="closeUpgradeModal(event)">
        <div class="modal-content" style="width:400px; padding:35px 30px;">
            <div id="upgrade-modal-body" style="text-align:center; padding:20px; color:#a0aec0;">
                로딩 중...
            </div>
        </div>
    </div>

    <script src="premium-info.js"></script>
    <!--
        common.js 로드 순서 정책:
        · common.js를 defer 없이 body 최하단에 배치합니다.
        · body 최하단 배치는 DOM이 이미 파싱된 후이므로 defer와 동일한
          효과를 가지면서, 이후 인라인 스크립트보다 먼저 실행됩니다.
        · 아래 인라인 <script>에는 defer를 사용하지 않습니다.
          인라인 스크립트에 defer는 HTML 명세상 무시되며(효과 없음),
          작성자의 의도와 실제 동작이 불일치하여 혼란을 유발합니다.
    -->
    <script src="common.js"></script>
    <!-- [FIX-Critical] defer 제거 — 인라인 스크립트에 defer는 HTML 명세상 무시됩니다.
         common.js가 동기로 먼저 실행된 뒤 이 블록이 실행되므로
         authHeaders 등 모든 전역 함수는 이미 정의되어 있습니다. -->
    <script>
        /* ── 과목 데이터 ── */
        const subjectData = {
            "1": ["고급임상심리학", "고급이상심리학", "고급심리검사", "고급심리치료", "고급연구방법론"],
            "2": ["심리학개론", "이상심리학", "심리검사", "임상심리학", "심리상담"]
        };

        // ─────────────────────────────────────────────────────────────────
        // [FIX-#1, #3] updateSubjects
        // 변경 전: 과목(sel-category)만 갱신하고 initYears()를 호출하지 않음
        //          → 급수 변경 시 연도 목록이 이전 상태로 고정되는 버그
        // 변경 후: 과목 갱신 후 initYears(grade)를 호출하여 연도도 함께 갱신
        //          grade를 인자로 전달하므로 years.js가 올바른 급수 기준으로
        //          연도 목록을 반환합니다.
        // ─────────────────────────────────────────────────────────────────
        function updateSubjects() {
            const grade          = document.getElementById('sel-grade').value;
            const categorySelect = document.getElementById('sel-category');
            if (!categorySelect) return;

            // 과목 목록 갱신
            categorySelect.innerHTML = '<option value="">과목 전체</option>';
            if (grade && subjectData[grade]) {
                subjectData[grade].forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub; opt.text = sub;
                    categorySelect.add(opt);
                });
            }

            // [FIX-#3] 급수 변경 시 연도 목록도 함께 갱신
            initYears(grade);
        }

        // ─────────────────────────────────────────────────────────────────
        // [FIX-#1] initYears — grade 파라미터 추가
        // 변경 전: grade 없이 빈 body {}를 전송
        //          → years.js가 premium 유저에게 grade 없음을 감지하고
        //            빈 배열을 즉시 반환하여 연도 목록이 항상 비어있던 버그
        // 변경 후: grade를 body에 포함하여 전송
        //          · grade 선택 시 → 해당 급수의 연도 목록 반환
        //          · grade 미선택('') 시 → free/admin은 전체 연도 반환,
        //            premium은 빈 배열 반환 (years.js 설계 유지)
        //
        // DOMContentLoaded에서 호출 시에는 grade=''로 호출합니다.
        // premium 유저는 급수를 먼저 선택해야 연도가 채워지는 UX가 됩니다.
        // (years.js의 premium + grade 없음 → 빈 배열 정책과 일치)
        // ─────────────────────────────────────────────────────────────────
        async function initYears(grade = '') {
            const yearSelect = document.getElementById('sel-year');
            if (!yearSelect) return;

            try {
                const response = await fetch('/api/years', {
                    method : 'POST',
                    headers: authHeaders(),
                    // [FIX-#1] grade를 body에 포함하여 전송
                    body   : JSON.stringify({ grade })
                });

                // 세션 만료 시 로그인 페이지로 이동
                if (response.status === 401) {
                    console.warn('세션이 만료되었습니다. 다시 로그인해주세요.');
                    location.href = 'index.html';
                    return;
                }

                if (!response.ok) throw new Error(`years API 오류 (${response.status})`);

                const years = await response.json();
                yearSelect.innerHTML = '<option value="">연도 전체</option>';
                years.forEach(year => {
                    const opt = document.createElement('option');
                    opt.value = year; opt.text = year + '년';
                    yearSelect.add(opt);
                });
            } catch (e) { console.error('연도 로드 실패:', e); }
        }

        /* ── 초기화 ── */
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('quiz_user'));
            if (!user || !user.email) {
                location.href = 'index.html';
                return;
            }

            // free 유저: 업그레이드 버튼 표시 + 문제 수 고정 + 연도 필터 비활성화
            if (user.status === 'free') {
                const upgradeBtn = document.getElementById('btn-upgrade');
                if (upgradeBtn) upgradeBtn.style.display = 'inline-block';

                const limitSelect = document.getElementById('sel-limit');
                if (limitSelect) {
                    limitSelect.innerHTML = '<option value="20">20문제</option>';
                    limitSelect.disabled  = true;
                }

                // [FIX-2025-3] 연도 필터 비활성화 — free 유저는 연도 선택 불가
                const yearSelect = document.getElementById('sel-year');
                if (yearSelect) {
                    yearSelect.innerHTML = '<option value="">연도 전체</option>';
                    yearSelect.disabled  = true;
                    yearSelect.title     = '프리미엄 회원 전용 기능입니다.';
                }
            }

            // common.js가 동기 로드되므로 authHeaders는 이미 정의되어 있습니다.
            //
            // [FIX-#1, #3] 초기화 순서 변경:
            // 변경 전: initYears() → updateSubjects() 순으로 별도 호출
            //          initYears()가 grade='' 없이 호출되어 premium 유저의
            //          연도 목록이 항상 비어있던 버그 발생
            // 변경 후: updateSubjects()만 호출
            //          updateSubjects() 내부에서 initYears(grade)를 호출하므로
            //          초기 grade=''(급수 전체) 기준으로 연도 목록이 함께 초기화됩니다.
            //          premium 유저는 grade 미선택 시 연도 목록이 빈 상태로 시작하며,
            //          급수를 선택하면 updateSubjects() → initYears(grade) 순으로
            //          자동 갱신됩니다.
            updateSubjects();
        });

        /* ── 프리미엄 정보 로드 (premium-info.js에서 직접 참조) ── */
        async function fetchPremiumInfo() {
            // premium-info.js가 <script src>로 로드되어 PREMIUM_INFO 전역 변수 사용
            if (typeof PREMIUM_INFO === 'undefined') {
                console.error('PREMIUM_INFO가 정의되지 않았습니다. premium-info.js를 확인하세요.');
                return null;
            }
            return PREMIUM_INFO;
        }

        /* ── 모달 내용 렌더링 ── */
        async function renderUpgradeModal() {
            const body = document.getElementById('upgrade-modal-body');
            const info = await fetchPremiumInfo();

            if (!info) {
                body.innerHTML = '<p style="color:#e53e3e;">안내 정보를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</p>';
                return;
            }

            const benefitItems = info.benefits.map((b, i) =>
                i === info.benefits.length - 1
                    ? `<li style="color:#a0aec0;">${b}</li>`
                    : `<li>${b}</li>`
            ).join('');

            body.innerHTML = `
                <div class="upgrade-icon">⭐</div>
                <div class="upgrade-title">${info.title}</div>
                <p class="upgrade-sub">${info.subtitle}</p>
                <div class="upgrade-payment-info">
                    <div class="payment-row">
                        <span class="payment-label">${info.price.label}</span>
                        <span class="payment-value">${info.price.amount}</span>
                    </div>
                </div>
                <ul class="upgrade-benefits">${benefitItems}</ul>
                <button class="btn-email-apply" onclick="sendUpgradeEmail()">
                    📧 이메일로 프리미엄 신청하기
                </button>
                <p class="upgrade-notice">${info.notice}</p>
                <button class="btn-close-text" onclick="closeUpgradeModal()">✕ 닫기</button>
            `;
        }

        /* ── 업그레이드 모달 열기/닫기 ── */
        window.showUpgradeModal = async function () {
            document.getElementById('upgrade-modal').style.display = 'flex';
            await renderUpgradeModal();
        };

        window.closeUpgradeModal = function (e) {
            if (!e || e.target === document.getElementById('upgrade-modal')) {
                document.getElementById('upgrade-modal').style.display = 'none';
            }
        };

        /* ── 이메일 신청 — 서버 API로 자동 발송 ── */
        window.sendUpgradeEmail = async function () {
            const btn = document.querySelector('.btn-email-apply');
            if (btn) { btn.disabled = true; btn.textContent = '발송 중...'; }

            try {
                const res  = await fetch('/api/send-mail', {
                    method : 'POST',
                    headers: authHeaders(),
                    body   : JSON.stringify({})
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message);

                // 성공 시 모달 내용을 완료 메시지로 교체
                document.getElementById('upgrade-modal-body').innerHTML = `
                    <div class="upgrade-icon">✅</div>
                    <div class="upgrade-title">신청 완료!</div>
                    <p class="upgrade-sub">
                        신청 메일이 발송되었습니다.<br>
                        입금 확인 후 1 영업일 이내 활성화됩니다.
                    </p>
                    <button class="btn-close-text" onclick="closeUpgradeModal()" style="margin-top:10px;">닫기</button>
                `;
            } catch (e) {
                alert('메일 발송 실패: ' + e.message);
                if (btn) { btn.disabled = false; btn.textContent = '📧 이메일로 프리미엄 신청하기'; }
            }
        };
    </script>
</body>
</html>
