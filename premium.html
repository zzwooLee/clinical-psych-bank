<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상심리사 퀴즈</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="premium-body">

    <main class="container">
        <div class="user-status-bar">
            <div class="user-info">
                <span class="user-email" id="display-email"></span>
                <span class="badge premium-badge" id="display-status"></span>
                <button id="btn-admin-menu" class="btn-admin-outline" style="display:none; margin-left: 10px;" onclick="toggleAdminPanel()">📊 통계 대시보드</button>
            </div>
            <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
        </div>
        <header class="premium-header">
            <h1 class="premium-title">임상심리사 퀴즈</h1>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <select id="sel-grade" onchange="updateSubjects()">
                    <option value="">급수 전체</option>
                    <option value="1">1급</option>
                    <option value="2">2급</option>
                </select>
                
                <select id="sel-category">
                    <option value="">과목 전체</option>
                </select>
                
                <select id="sel-year">
                    <option value="">연도 전체</option>
                </select>

                <select id="sel-limit">
                    <option value="20">20문제</option>
                    <option value="30">30문제</option>
                    <option value="50">50문제</option>
                    <option value="100">100문제</option>
                </select>
            </div>
            
            <button class="btn-random" onclick="loadQuestions()">
                <span>🎲</span> 랜덤 출제
            </button>
        </div>

        <div id="question-area">
            <div class="card empty-state">
                <p>상단 필터를 선택하고 <strong>랜덤 출제</strong> 버튼을 눌러주세요.</p>
            </div>
        </div>

        <div id="admin-panel" class="admin-panel-card" style="display:none; background-color: #fcfcfc; border: 1px solid #d1d5db;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #1a202c;">📊 시스템 관리 대시보드</h3>
                <button onclick="toggleAdminPanel()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">✕</button>
            </div>
            
            <div class="admin-stats-grid">
                <div class="stat-card">
                    <span class="stat-label">전체 문제 수</span>
                    <span id="stat-total-questions" class="stat-value">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">오늘 접속자</span>
                    <span id="stat-today-users" class="stat-value">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">프리미엄 비율</span>
                    <span id="stat-premium-rate" class="stat-value">-%</span>
                </div>
            </div>
        
            <div class="admin-user-management" style="margin-top: 30px; border-top: 1px solid #edf2f7; padding-top: 20px;">
                <h4 style="color: #364d79; margin-bottom: 15px;">👥 회원 권한 관리</h4>
                <div style="overflow-x: auto; max-height: 400px;">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th>이메일</th>
                                <th>현재 등급</th>
                                <th>등급 변경</th>
                            </tr>
                        </thead>
                        <tbody id="user-list-body">
                            <tr><td colspan="3" style="text-align:center; padding:20px; color:#a0aec0;">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        
            <div style="margin-top: 20px; text-align: right;">
                <button class="btn-refresh-stats" onclick="loadAdminStats(); loadUserList();" style="cursor:pointer;">데이터 새로고침</button>
            </div>
        </div>
    </main>

    <script src="common.js"></script>
    <script>
        const subjectData = {
            "1": ["고급임상심리학", "고급이상심리학", "고급심리검사", "고급심리치료", "고급연구방법론"],
            "2": ["심리학개론", "이상심리학", "심리검사", "임상심리학", "심리상담"]
        };

        function updateSubjects() {
            const grade = document.getElementById('sel-grade').value;
            const categorySelect = document.getElementById('sel-category');
            categorySelect.innerHTML = '<option value="">과목 전체</option>';
            if (grade && subjectData[grade]) {
                subjectData[grade].forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub; opt.text = sub;
                    categorySelect.add(opt);
                });
            }
        }

        async function initYears() {
            const yearSelect = document.getElementById('sel-year');
            if (!yearSelect) return;
            try {
                const response = await fetch('/api/years');
                const years = await response.json();
                yearSelect.innerHTML = '<option value="">연도 전체</option>';
                if (years && years.length > 0) {
                    years.forEach(year => {
                        const opt = document.createElement('option');
                        opt.value = year; opt.text = year + "년";
                        yearSelect.add(opt);
                    });
                }
            } catch (e) { console.error("연도 로드 실패", e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initYears();
            const savedUser = sessionStorage.getItem('quiz_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('display-status').innerText = user.status.toUpperCase();
                
                // 추가 제안: Free 등급일 경우 개수 선택 제한
                const limitSelect = document.getElementById('sel-limit');
                if (user.status === 'free' && limitSelect) {
                    limitSelect.disabled = true;
                    limitSelect.title = "Premium 전용 기능입니다.";
                }
            } else {
                location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
